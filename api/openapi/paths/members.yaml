members:
  post:
    summary: 会員登録
    description: 管理者が新規会員を登録する。Cognito ユーザーを作成し、DynamoDB に会員情報を保存する。
    operationId: createMember
    tags:
      - Members
    security:
      - CognitoAuthorizer: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: "../../openapi/components/schemas/member.yaml#/MemberCreateRequest"
    responses:
      "201":
        description: 会員登録成功
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/member.yaml#/Member"
      "400":
        description: バリデーションエラー
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/error.yaml#/ErrorResponse"
      "401":
        description: 認証エラー
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/error.yaml#/ErrorResponse"
      "403":
        description: 権限エラー（管理者以外）
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/error.yaml#/ErrorResponse"
      "409":
        description: メールアドレス重複
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/error.yaml#/ErrorResponse"
      "500":
        description: サーバーエラー
        content:
          application/json:
            schema:
              $ref: "../../openapi/components/schemas/error.yaml#/ErrorResponse"
